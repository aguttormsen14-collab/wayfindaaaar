<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <title>Wayfinding</title>
  <link rel="stylesheet" href="styles.css?v=20260303-2">
</head>

<body>
  <div id="app">
    <div id="screen">
      <div id="bgA" class="bg-layer"></div>
      <div id="bgB" class="bg-layer"></div>

      <video id="video" playsinline muted></video>
      <div id="hotspots"></div>
    </div>
  </div>
  <div id="storeModal" class="modal hidden">
    <div class="modal-card">
      <button id="storeClose">✕</button>
      <div id="storeBody"></div>
    </div>
  </div>
  <!-- discreet admin access, shown only in debug mode -->
  <a id="adminLink" href="./admin/login.html">Admin</a>

  <!-- GitHub Pages base path detection (FIRST) -->
  <script src="base-path.js"></script>

  <!-- Root configuration -->
  <script src="./config.js"></script>

  <!-- Supabase client library from CDN (must load before helpers are used) -->
  <!-- v2 official bundle -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Supabase configuration helpers -->
  <script src="./supabase-config.js"></script>

  <!-- Main application (player) -->
  <script src="app.js?v=20260303-2"></script>

  <!-- Preflight validation (verify critical scripts loaded) -->
  <script>
    // Check that supabase-config helpers are available
    if (typeof window.getSupabaseConfig !== 'function' || typeof window.isSupabaseConfigured !== 'function') {
      console.error('[PREFLIGHT] supabase-config.js not loaded (path mismatch on GitHub Pages?)');
      const appEl = document.getElementById('app');
      if (appEl) {
        appEl.innerHTML = '<div style="padding:20px; color: red; font-family: monospace;"><strong>Setup Error:</strong> supabase-config.js not loaded. Check Network tab for 404s.</div>';
      }
    }
    // Check that Supabase client library loaded
    if (typeof window.supabase === 'undefined') {
      console.error('[PREFLIGHT] Supabase client library (CDN) not loaded');
    }
  </script>

  <!-- PWA Service Worker Registration (non-caching, installability only) -->
  <script>
    // Register service worker for PWA installability on Android
    // SW is intentionally non-caching to avoid stale content in kiosks
    if ('serviceWorker' in navigator) {
      const swPath = `${window.SX_BASE_PATH || '/'}sw.js`.replace(/\/\/+/, '/');
      navigator.serviceWorker.register(swPath)
        .then(reg => {
          // Only log in debug mode if available
          if (typeof DEBUG !== 'undefined' && DEBUG) {
            console.log('[SW] Registered:', reg.scope);
          }
        })
        .catch(err => {
          // Silent fail - app works without SW
          if (typeof DEBUG !== 'undefined' && DEBUG) {
            console.warn('[SW] Registration failed (app still works):', err);
          }
        });
    }
  </script>
</body>

</html>
