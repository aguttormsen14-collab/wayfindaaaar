<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body data-theme="saxvik-clean">

  <div class="shell">

    <div class="topbar">
      <div class="title">
        <h1>Saxvik Admin</h1>
        <p>Infoskjerm kontrollpanel</p>
      </div>

      <button id="logoutBtn" class="btn-secondary">
        Logg ut
      </button>
    </div>

    <div class="grid">

      <div class="panel col-6">
        <h2>Installasjoner</h2>
        <p>Velg kunde/installasjon (kommer snart)</p>
      </div>

      <div class="panel col-6">
        <h2>Reklame</h2>
        <div id="adsPanel">
          <div id="uploadZone" class="upload-zone">Dra media hit for å laste opp</div>
          <ul id="adsList"></ul>
          <p id="adsMessage" class="helper"></p>
        </div>
      </div>

      <div class="panel col-12">
        <h2>Status</h2>
        <p>Systemstatus og info vises her</p>
      </div>

    </div>

  </div>

  <!-- supabase client for upload/listing -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
  <script src="../supabase-config.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
