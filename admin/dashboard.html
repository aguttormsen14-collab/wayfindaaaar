<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saxvik Admin</title>
  <link rel="stylesheet" href="dashboard.css?v=99" />
</head>

<body data-theme="saxvik-clean">
  <div class="shell">
    <div class="topbar">
      <div class="title">
        <img
          src="../assets/brand/saxvik-hub-logo.png?v=99"
          alt="Saxvik Hub"
          class="logo"
          onerror="console.error('Logo ikke funnet:', this.src);"
          data-asset="assets/brand/saxvik-hub-logo.png"
        />
        <div class="title-text">
          <h1>Saxvik Admin</h1>
          <p>Infoskjerm kontrollpanel</p>
        </div>
      </div>

      <button id="logoutBtn" class="btn-secondary">Logg ut</button>
    </div>

    <div class="grid">
      <div class="panel col-6">
        <h2>Installasjoner</h2>
        <p>Valgt installasjon: <strong id="currentInstall">amfi-steinkjer</strong></p>
      </div>

      <div class="panel col-6">
        <h2>Reklame</h2>

        <div id="adsPanel">
          <div id="adsDropzone" class="upload-zone">
            📤 Dra og slipp bilder/video her
            <br />
            <small style="opacity: 0.7;">(jpg, jpeg, png, webp, mp4)</small>
          </div>

          <div class="ads-actions">
            <button class="ads-btn-refresh" onclick="refreshAdsPanel()">🔄 Refresh</button>
          </div>

          <div id="adsList" class="ads-list"></div>
          <p id="adsMessage" class="helper"></p>
        </div>
      </div>

      <div class="panel col-12">
        <h2>Status</h2>
        <div id="statusContent">
          <p>Laster statusinfo…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- IMPORTANT: scripts must be at end of body and in this order -->
  
  <!-- GitHub Pages base path detection (FIRST) -->
  <script src="../base-path.js"></script>
  
  <!-- Root configuration (from parent directory) -->
  <script src="../config.js"></script>
  
  <!-- Supabase client library from CDN (v2, before config helpers) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Supabase configuration helpers (from parent directory) -->
  <script src="../supabase-config.js"></script>

  <!-- Admin libraries and bootstrap -->
  <script src="./admin-ads.js"></script>
  <script src="./dashboard.js"></script>
  
  <!-- GitHub Pages asset path fixup (uses SX_BASE_PATH from base-path.js) -->
  <script>
    function asset(path) {
      return `${window.SX_BASE_PATH || "/"}${path}`;
    }
    // Apply to any element with data-asset
    document.querySelectorAll('[data-asset]').forEach((el) => {
      const p = el.getAttribute('data-asset');
      if (!p) return;
      if (el.tagName === 'IMG' || el.tagName === 'SCRIPT') el.src = asset(p);
      else if (el.tagName === 'LINK') el.href = asset(p);
    });
  </script>

  <!-- Preflight validation (verify critical scripts loaded) -->
  <script>
    // Check that supabase-config helpers are available
    if (typeof window.getSupabaseConfig !== 'function' || typeof window.isSupabaseConfigured !== 'function') {
      const zoneEl = document.getElementById('adsDropzone');
      if (zoneEl) {
        zoneEl.innerHTML = '❌ Mangler supabase-config.js (helpers)<br><small>Sjekk Network-fanen for 404-feil</small>';
        zoneEl.style.color = '#dc2626';
      }
      console.error('[ADMIN PREFLIGHT] supabase-config.js not loaded');
    }
    // Check that Supabase client library loaded
    if (typeof window.supabase === 'undefined') {
      console.error('[ADMIN PREFLIGHT] Supabase client library (CDN) not loaded');
    }
  </script>
</body>
</html>
