<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saxvik Admin</title>
  <link rel="stylesheet" href="dashboard.css?v=99" />
</head>

<body data-theme="saxvik-clean">
  <div class="shell">
    <div class="topbar">
      <div class="title">
        <img
          src="../assets/brand/saxvik-hub-logo.png?v=99"
          alt="Saxvik Hub"
          class="logo"
          onerror="console.error('Logo ikke funnet:', this.src);"
        />
        <div class="title-text">
          <h1>Saxvik Admin</h1>
          <p>Infoskjerm kontrollpanel</p>
        </div>
      </div>

      <button id="logoutBtn" class="btn-secondary">Logg ut</button>
    </div>

    <div class="grid">
      <div class="panel col-6">
        <h2>Installasjoner</h2>
        <p>Valgt installasjon: <strong id="currentInstall">amfi-steinkjer</strong></p>
      </div>

      <div class="panel col-6">
        <h2>Reklame</h2>

        <div id="adsPanel">
          <div id="adsDropzone" class="upload-zone">
            📤 Dra og slipp bilder/video her
            <br />
            <small style="opacity: 0.7;">(jpg, jpeg, png, webp, mp4)</small>
          </div>

          <div class="ads-actions">
            <button class="ads-btn-refresh" onclick="refreshAdsPanel()">🔄 Refresh</button>
          </div>

          <div id="adsList" class="ads-list"></div>
          <p id="adsMessage" class="helper"></p>
        </div>
      </div>

      <div class="panel col-12">
        <h2>Status</h2>
        <div id="statusContent">
          <p>Laster statusinfo…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- IMPORTANT: scripts must be at end of body and in this order -->
  <script src="../config.js?v=99"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
  <script src="../supabase-config.js?v=99"></script>

  <!-- Admin logic (library + bootstrap) -->
  <script src="./admin-ads.js?v=99"></script>
  <script src="./dashboard.js?v=99"></script>
</body>
</html>
