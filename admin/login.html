<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b4f8a'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' font-size='34' fill='white' font-family='Arial,sans-serif'%3ES%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="login.css">
</head>

<body data-theme="saxvik-clean">

  <div class="wrap">
    <div class="card">

      <div class="header">
        <img id="sxLogo" src="" alt="Saxvik Hub" class="logo-header">
        <div class="hgroup">
          <h1>Saxvik Admin</h1>
          <p>Wayfinding kontrollpanel</p>
        </div>
      </div>

      <div class="content">

        <form id="loginForm">

          <label for="username">E-post</label>
          <input type="email" id="username" required autocomplete="email">

          <label for="password">Passord</label>
          <input type="password" id="password" required autocomplete="current-password">

          <div class="row">
            <button type="submit" class="btn">Logg inn</button>
          </div>

        </form>

        <p id="message" class="helper"></p>

      </div>

      <div class="footer">
        <span>Saxvik Kontorsenter</span>
        <span>Admin</span>
      </div>

    </div>
  </div>

  <!-- GitHub Pages base path detection (FIRST) -->
  <script src="../base-path.js"></script>

  <!-- Supabase client library from CDN (before config/helpers) -->
  <!-- v2 official bundle; must load before supabase-config.js and any code using window.supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Configuration from parent directory (local overrides first) -->
  <script src="../config.local.js" onerror="console.log('[LOGIN] config.local.js not found (optional)')"></script>
  <script src="../config.js"></script>

  <!-- Supabase configuration helpers (creates window.supabaseClient) -->
  <script src="../supabase-config.js"></script>

  <!-- Admin authentication helpers (Supabase Auth) -->
  <script src="./admin-auth-supabase.js"></script>

  <!-- Login page logic -->
  <script src="login.js"></script>

  <!-- GitHub Pages asset path fixup (uses SX_BASE_PATH from base-path.js) -->
  <script>
    const params = new URLSearchParams(location.search);
    const INSTALL_ID = params.get("install") || "amfi-steinkjer";

    function asset(path) {
      return `${window.SX_BASE_PATH || "/"}${path}`;
    }
    
    // Load logo from correct installation path (relative to admin folder)
    document.addEventListener("DOMContentLoaded", () => {
      const img = document.getElementById("sxLogo");
      if (img) {
        // Use relative path from admin/ folder
        const logoPath = `../installs/${INSTALL_ID}/assets/brand/saxvik-hub/Current/saxvik-hub-logo.png`;
        img.src = logoPath;
        console.log('[LOGIN] Logo path:', logoPath);
      }
    });
  </script>

  <!-- Preflight validation -->
  <script>
    if (typeof window.getSupabaseConfig !== 'function') {
      console.warn('[LOGIN] supabase-config helpers not loaded');
    }
  </script>
</body>

</html>
