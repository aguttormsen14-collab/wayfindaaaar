<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="login.css">
</head>

<body data-theme="saxvik-clean">

  <div class="wrap">
    <div class="card">

      <div class="header">
        <img id="sxLogo" src="" alt="Saxvik Hub" class="logo-header">
        <div class="hgroup">
          <h1>Saxvik Admin</h1>
          <p>Wayfinding kontrollpanel</p>
        </div>
      </div>

      <div class="content">

        <form id="loginForm">

          <label for="username">Brukernavn</label>
          <input type="text" id="username" required autocomplete="off">

          <label for="password">Passord</label>
          <input type="password" id="password" required autocomplete="off">

          <div class="row">
            <button type="submit" class="btn">Logg inn</button>
          </div>

        </form>

        <p id="message" class="helper"></p>

      </div>

      <div class="footer">
        <span>Saxvik Kontorsenter</span>
        <span>Admin</span>
      </div>

    </div>
  </div>

  <!-- GitHub Pages base path detection (FIRST) -->
  <script src="../base-path.js"></script>

  <!-- Configuration from parent directory -->
  <script src="../config.js"></script>

  <!-- Supabase client library from CDN (before helpers if used) -->
  <!-- v2 official bundle; must load before supabase-config.js and any code using window.supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Supabase configuration helpers -->
  <script src="../supabase-config.js"></script>

  <!-- Login page logic -->
  <script src="login.js"></script>

  <!-- GitHub Pages asset path fixup (uses SX_BASE_PATH from base-path.js) -->
  <script>
    const params = new URLSearchParams(location.search);
    const INSTALL_ID = params.get("install") || "amfi-steinkjer";

    function asset(path) {
      return `${window.SX_BASE_PATH || "/"}${path}`;
    }
    
    // Load logo from correct installation path (relative to admin folder)
    document.addEventListener("DOMContentLoaded", () => {
      const img = document.getElementById("sxLogo");
      if (img) {
        // Use relative path from admin/ folder
        const logoPath = `../installs/${INSTALL_ID}/assets/brand/saxvik-hub/Current/saxvik-hub-logo.png`;
        img.src = logoPath;
        console.log('[LOGIN] Logo path:', logoPath);
      }
    });
  </script>

  <!-- Preflight validation -->
  <script>
    if (typeof window.getSupabaseConfig !== 'function') {
      console.warn('[LOGIN] supabase-config helpers not loaded');
    }
  </script>
</body>

</html>
